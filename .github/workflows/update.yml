name: Payslip Processor

on:
  workflow_dispatch:

jobs:
  run-script:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Show repo files (debug)
        run: ls -la

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install -r requirements.txt
          
      - name: Run script
        run: python extract.py

      - name: Delete processed payslip
        run: rm -f payslips/payslip.pdf
        
      - name: Show JSON
        run: cat payslipsummary.json
        
      - name: Commit updates
        run: |
          git config --global user.name "automation"
          git config --global user.email "bot@github.com"
          git add payslipsummary.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update finance data"
          git push
